
<!DOCTYPE html>
<html>
<head>
  <title>AI Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #00adb5;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007b83;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #00adb5;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<h1>🎨 AI Image Generator</h1>

<div class="container">

  <!-- TEXT TO IMAGE -->
  <div class="box">
    <h3>Text → Image</h3>

    <input id="text" placeholder="Enter prompt">

    <br>
    <button onclick="enhanceText()">Enhance</button>
    <button onclick="generateImage()">Generate</button>

    <p id="enhanced"></p>

    <div class="loader" id="loader1"></div>
    <img id="img">

    <br>
    <button onclick="downloadImage('img')">Download</button>
  </div>

  <!-- IMAGE TO VARIATION -->
  <div class="box">
    <h3>Image → Variation</h3>

    <input type="file" id="file">

    <br>
    <button onclick="analyze()">Analyze</button>
    <button onclick="variation()">Variation</button>

    <p id="desc"></p>

    <div class="loader" id="loader2"></div>
    <img id="img2">

    <br>
    <button onclick="downloadImage('img2')">Download</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
